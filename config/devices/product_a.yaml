device:
  name: "Product-A"
  build_type: "user"
  screen_resolution: [1080, 2400]
  has_sim: false
  has_dp_output: false
  lock_pin: "0000"              # FBE unlock PIN (omit if no PIN set)
  # phone_number: "+886912345678"    # DUT SIM 電話號碼 (SMS 測試用)
  # peer_serial: "PEER_SERIAL_123"  # Peer 裝置序號 (SMS 雙機測試)
  # peer_phone_number: "+886900000000"

  flash:
    profile: "fastboot"
    pre_flash:
      - "fastboot oem unlock Trimble-Thorpe"
    script: "${BUILD_DIR}/fastboot.bash"
    script_timeout: 600

  aoa:
    enabled: true
    vendor_id: 0x099E
    product_id: 0x02B1
    rotation: 90            # landscape tablet
    keyboard_hid_id: 1
    touch_hid_id: 2
    consumer_hid_id: 3

  screen_capture:
    method: "adb"
    webcam_device: "/dev/video0"
    webcam_crop: [100, 50, 1080, 1920]

  usb_power:
    hub_location: "1-1"
    port: 3
    off_duration: 20.0
    reset_delay: 3               # 秒，factory reset 後等待裝置關機再斷電

  setup_wizard:
    method: "llm_vision"
    max_steps: 30
    timeout: 300
